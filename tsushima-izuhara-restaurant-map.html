<!DOCTYPE html>
<html lang="ko" class="theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대마도 이즈하라 맛집 가이드 · 도요코인 중심</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    /* ─── Color System — Claude coral warm palette (ref: 2026-fileshare-migration-meeting.html) ─── */
    :root {
      --claude-coral:      #D4633A;
      --claude-coral-deep: #B8502D;
      --claude-coral-soft: #E8896A;
      --claude-coral-pale: #F5D5C8;
      --claude-warm:       #C96442;
      --claude-sand:       #E8C9A0;
      --claude-cream:      #FBF8F4;
      --claude-parchment:  #F5EFE6;
      --claude-brown:      #7A4A35;
      --claude-dark:       #1E1008;
    }
    .theme-light {
      --bg:              #FBF8F4;
      --surface:         #FFFFFF;
      --surface-hover:   #FDF3EC;
      --surface-warm:    #FEF6EE;
      --border:          rgba(212,99,58,0.12);
      --border-soft:     rgba(212,99,58,0.07);
      --text:            #1E1008;
      --text-secondary:  #8B5E4A;
      --text-muted:      #B08070;
      --accent:          #D4633A;
      --accent-hover:    #B8502D;
      --accent-secondary:#E8896A;
      --accent-pale:     #F5D5C8;
      --positive:        #5B8A5E;
      --negative:        #B85050;
      --warning:         #C48A2E;
      --highlight:       #C96442;
    }
    .theme-dark {
      --bg:              #150D07;
      --surface:         #1E1208;
      --surface-hover:   #2A1A0F;
      --surface-warm:    #261608;
      --border:          rgba(212,99,58,0.18);
      --border-soft:     rgba(212,99,58,0.08);
      --text:            #F5EDE5;
      --text-secondary:  #C49A80;
      --text-muted:      #8B6550;
      --accent:          #E8896A;
      --accent-hover:    #D4633A;
      --accent-secondary:#F0A882;
      --accent-pale:     rgba(212,99,58,0.18);
      --positive:        #7DAE80;
      --negative:        #D47070;
      --warning:         #D4A850;
      --highlight:       #E8896A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans KR', 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      transition: background 0.25s, color 0.25s;
    }
    /* Subtle background atmosphere */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(212,99,58,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,80,50,0.04) 0%, transparent 50%);
    }

    /* ===== HERO ===== */
    .hero {
      padding: 60px 28px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* Light theme hero */
    .theme-light .hero {
      background:
        radial-gradient(ellipse 130% 180% at -10% 60%, rgba(210,110,75,0.38) 0%, rgba(230,155,120,0.16) 45%, transparent 75%),
        radial-gradient(ellipse 100% 150% at 20% -10%, rgba(220,130,95,0.22) 0%, transparent 65%),
        linear-gradient(110deg, rgba(235,165,130,0.15) 0%, rgba(251,248,244,0) 70%);
      background-color: var(--bg);
    }
    /* Dark theme hero */
    .theme-dark .hero {
      background:
        radial-gradient(ellipse 80% 120% at 0% 50%, rgba(180,80,45,0.50) 0%, rgba(140,60,30,0.25) 35%, transparent 65%),
        radial-gradient(ellipse 60% 100% at 15% 0%, rgba(160,70,35,0.30) 0%, transparent 55%),
        linear-gradient(105deg, rgba(120,50,20,0.20) 0%, rgba(21,13,7,0) 55%);
      background-color: var(--bg);
    }
    /* Dot grid on right */
    .hero::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(180,100,65,0.12) 1px, transparent 1px);
      background-size: 22px 22px;
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.15) 40%, transparent 65%);
      mask-image: linear-gradient(to left, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.15) 40%, transparent 65%);
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent-pale); color: var(--accent);
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      padding: 6px 16px; border-radius: 100px; text-transform: uppercase;
      margin-bottom: 22px; position: relative; z-index: 1;
    }
    .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 800;
      color: var(--text); letter-spacing: -0.03em; line-height: 1.15;
      margin-bottom: 12px; position: relative; z-index: 1;
    }
    .hero h1 span { color: var(--accent); }
    .hero-sub {
      font-size: 0.95rem; color: var(--text-secondary);
      position: relative; z-index: 1; margin-bottom: 28px;
    }
    .hero-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; position: relative; z-index: 1; }
    .hero-stat { text-align: center; }
    .hero-stat-val {
      font-size: 2rem; font-weight: 800; color: var(--accent);
      letter-spacing: -0.03em; line-height: 1;
    }
    .hero-stat-lbl {
      font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.07em; margin-top: 4px; font-weight: 600;
    }
    .hero-stat-div { width: 1px; background: var(--border); align-self: stretch; }

    /* ===== LAYOUT ===== */
    .app-body {
      display: grid; grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 200px);
      position: relative; z-index: 1;
    }
    @media (max-width: 900px) { .app-body { grid-template-columns: 1fr; } }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: var(--bg); border-right: 1px solid var(--border);
      overflow-y: auto; max-height: calc(100vh - 200px);
      position: sticky; top: 0;
    }
    .sidebar-header {
      padding: 20px 20px 14px; border-bottom: 1px solid var(--border);
    }
    .sidebar-section-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }
    .sidebar-header h2 {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      margin-bottom: 14px; letter-spacing: -0.02em;
    }

    /* Category filter pills */
    .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-pill {
      padding: 5px 13px; border-radius: 100px; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-secondary);
      transition: all 0.15s; display: flex; align-items: center; gap: 5px;
    }
    .cat-pill:hover { border-color: var(--accent); color: var(--accent); background: var(--surface-warm); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Search */
    .search-wrap { position: relative; padding: 14px 20px 0; }
    .search-icon { position: absolute; left: 33px; top: 50%; transform: translateY(-30%); color: var(--text-muted); pointer-events: none; }
    .search-input {
      width: 100%; padding: 9px 14px 9px 36px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 0.85rem; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,99,58,0.12);
    }

    /* Restaurant list */
    .rest-list { padding: 12px 12px 24px; }
    .rest-card {
      padding: 14px 16px; border-radius: 14px; cursor: pointer; margin-bottom: 8px;
      border: 1px solid var(--border); background: var(--surface);
      transition: box-shadow 0.2s, border-color 0.2s, background 0.15s;
      display: flex; align-items: flex-start; gap: 12px;
      position: relative; overflow: hidden;
    }
    .rest-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      opacity: 0; transition: opacity 0.18s;
    }
    .rest-card:hover { box-shadow: 0 8px 24px rgba(212,99,58,0.10); border-color: var(--accent-secondary); }
    .rest-card:hover::before { opacity: 1; }
    .rest-card.active {
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(212,99,58,0.14);
      background: var(--surface-warm);
    }
    .rest-card.active::before { opacity: 1; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .rest-info { flex: 1; min-width: 0; }
    .rest-name { font-size: 0.92rem; font-weight: 700; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rest-name-jp { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 5px; }
    .rest-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rest-rating { font-size: 0.78rem; font-weight: 700; color: var(--warning); display: flex; align-items: center; gap: 2px; }
    .rest-reviews { font-size: 0.72rem; color: var(--text-muted); }
    .rest-price { font-size: 0.72rem; color: var(--text-secondary); }
    .rest-hours { font-size: 0.72rem; color: var(--text-secondary); }
    .cat-badge {
      font-size: 0.67rem; padding: 2px 8px; border-radius: 100px;
      font-weight: 700; color: #fff; white-space: nowrap;
    }
    .rest-distance { font-size: 0.72rem; color: var(--accent); font-weight: 700; }
    .rest-tip { font-size: 0.76rem; color: var(--text-secondary); margin-top: 5px; line-height: 1.5; }

    /* ===== MAP ===== */
    #map { height: calc(100vh - 200px); min-height: 500px; }
    @media (max-width: 900px) { #map { height: 420px; } }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      box-shadow: 0 8px 32px rgba(30,16,8,0.14) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .popup-inner { padding: 16px 18px; min-width: 210px; }
    .popup-name { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .popup-jp { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; }
    .popup-meta { display: flex; gap: 8px; align-items: center; font-size: 0.78rem; color: var(--text-secondary); flex-wrap: wrap; }
    .popup-tip {
      font-size: 0.78rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.5;
      border-top: 1px solid var(--border-soft); padding-top: 8px;
    }
    .leaflet-popup-tip-container { display: none !important; }

    /* ===== CUSTOM MARKER ===== */
    .custom-marker {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border: 2.5px solid #fff;
      box-shadow: 0 2px 8px rgba(30,16,8,0.25); cursor: pointer;
    }
    .hotel-marker {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; border: 3px solid #fff;
      box-shadow: 0 3px 12px rgba(30,16,8,0.3);
      background: linear-gradient(135deg, #B8502D, #E8896A);
    }

    /* ===== MENU ===== */
    .viz-menu { position: fixed; top: 16px; right: 16px; z-index: 9000; }
    .viz-menu-toggle {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(212,99,58,0.10);
      transition: background 0.2s, box-shadow 0.2s; color: var(--text);
    }
    .viz-menu-toggle:hover { background: var(--surface-hover); box-shadow: 0 4px 16px rgba(212,99,58,0.18); }
    .viz-menu-dropdown {
      position: absolute; top: 48px; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 6px; min-width: 190px;
      box-shadow: 0 8px 32px rgba(30,16,8,0.14);
      display: none;
    }
    .viz-menu-dropdown.open { display: block; }
    .viz-menu-dropdown button {
      width: 100%; padding: 10px 12px; border: none; border-radius: 8px;
      background: none; color: var(--text-secondary); font-size: 0.875rem;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s, color 0.15s;
    }
    .viz-menu-dropdown button:hover { background: var(--surface-hover); color: var(--text); }

    /* ===== RESULT COUNT ===== */
    .result-count { font-size: 0.72rem; color: var(--text-muted); padding: 8px 20px 0; font-weight: 600; letter-spacing: 0.04em; }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.85rem; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeInUp 0.55s cubic-bezier(0.22,1,0.36,1) both; }
    .animate.delay-1 { animation-delay: 0.08s; }
    .animate.delay-2 { animation-delay: 0.16s; }
    .animate.delay-3 { animation-delay: 0.24s; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 375px) { body { overflow-x: hidden; } .hero h1 { font-size: 1.7rem; } }
    @media print {
      .viz-menu { display: none; }
      body { background: white !important; }
      body::before { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
</style>
</head>
<body>
  <a href="#main-content" style="position:absolute;left:-9999px" onfocus="this.style.cssText='position:fixed;left:16px;top:16px;z-index:10000;padding:8px 16px;background:var(--accent);color:white;text-decoration:none;border-radius:4px;'">콘텐츠로 이동</a>

  <!-- MENU -->

      </svg>

  </div>

  <main id="main-content" role="main">

    <header class="hero" role="banner">

      <h1 class="animate delay-1">🗾 이즈하라 <span>맛집 지도</span></h1>

        <div class="hero-stat"><div class="hero-stat-val" data-count="6">6</div><div class="hero-stat-lbl">카테고리</div></div>
        <div class="hero-stat-div"></div>
        <div class="hero-stat"><div class="hero-stat-val" data-count="10">10</div><div class="hero-stat-lbl">도보 10분 이내</div></div>
      </div>
    </header>

    <!-- BODY -->
    <div class="app-body">

      <!-- SIDEBAR -->
      <aside class="sidebar" role="complementary" aria-label="맛집 목록">
        <div class="sidebar-header">
          <div class="sidebar-section-label">카테고리</div>
          <h2>필터</h2>
          <div class="cat-pills" id="catPills">
            <button class="cat-pill active" data-cat="all" style="background:#C85A30;border-color:#C85A30;color:#fff" onclick="filterCat('all',this)">🗺 전체</button>
            <button class="cat-pill" data-cat="ramen" onclick="filterCat('ramen',this)">🍜 라멘</button>
            <button class="cat-pill" data-cat="teishoku" onclick="filterCat('teishoku',this)">🍱 정식·백반</button>
            <button class="cat-pill" data-cat="sushi" onclick="filterCat('sushi',this)">🍣 초밥·해산물</button>
            <button class="cat-pill" data-cat="soba" onclick="filterCat('soba',this)">🍝 소바·우동</button>
            <button class="cat-pill" data-cat="izakaya" onclick="filterCat('izakaya',this)">🍶 이자카야</button>
            <button class="cat-pill" data-cat="cafe" onclick="filterCat('cafe',this)">☕ 카페</button>
          </div>
        </div>

        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="searchInput" type="text" placeholder="가게명 검색..." oninput="filterSearch()" aria-label="맛집 검색" style="padding-left:36px">
        </div>
        <div class="result-count" id="resultCount"></div>

        <div class="rest-list" id="restList" role="list"></div>
      </aside>

      <!-- MAP -->
      <section aria-label="지도">
        <div id="map" role="img" aria-label="이즈하라 맛집 지도"></div>
      </section>
    </div>

  </main>

      },
      // === 카페 ===

      {

    // ===== MAP INIT =====
    var map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([34.2055, 129.2918], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19
    }).addTo(map);

    // Hotel marker
    var hotelIcon = L.divIcon({
      className: '',
      html: '<div class="hotel-marker">🏨</div>',
      iconSize: [42, 42], iconAnchor: [21, 21], popupAnchor: [0, -24]
    });
    L.marker([34.2058, 129.2924], { icon: hotelIcon }).addTo(map)
      .bindPopup('<div class="popup-inner"><div class="popup-name" style="color:#C85A30;font-weight:800;">🏨 도요코인 쓰시마이즈하라점</div><div class="popup-jp">東横INN 対馬厳原</div><div class="popup-meta" style="margin-top:4px">📍 기준 위치 (숙소)</div></div>');

    // Restaurant markers
    var markers = {};
    RESTAURANTS.forEach(function(r) {
      var cat = CATEGORIES[r.cat];
      var icon = L.divIcon({
        className: '',
        html: '<div class="custom-marker" style="background:' + cat.color + '">' + cat.emoji + '</div>',
        iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -18]
      });
      var popup = '<div class="popup-inner">'
        + '<div class="cat-badge" style="background:' + cat.color + ';display:inline-block;margin-bottom:6px">' + cat.emoji + ' ' + cat.label + '</div>'
        + '<div class="popup-name">' + r.name + '</div>'
        + '<div class="popup-jp">' + r.nameJp + '</div>'
        + '<div class="popup-meta">'
        + '<span>' + '⭐'.repeat(Math.round(r.rating)) + ' ' + r.rating + '</span>'
        + '<span>(' + r.reviews + ')</span>'
        + '<span>' + r.price + '</span>'
        + '</div>'
        + '<div class="popup-meta" style="margin-top:3px"><span>🕐 ' + r.hours + '</span></div>'
        + '<div class="popup-meta"><span>🚶 ' + r.distance + '</span></div>'
        + '<div class="popup-tip">' + r.tip + '</div>'
        + '</div>';
      var mk = L.marker([r.lat, r.lng], { icon: icon }).addTo(map).bindPopup(popup);
      markers[r.id] = mk;
      mk.on('click', function() { highlightCard(r.id); });
    });

    // ===== SIDEBAR CARDS =====
    var restListEl = document.getElementById('restList');

    function renderCards(data) {
      restListEl.innerHTML = '';
      if (data.length === 0) {
        restListEl.innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><br>검색 결과가 없습니다</div>';
        return;
      }
      data.forEach(function(r, idx) {
        var cat = CATEGORIES[r.cat];
        var stars = '';
        for (var i = 0; i < 5; i++) stars += (i < Math.round(r.rating)) ? '★' : '☆';
        var div = document.createElement('div');
        div.className = 'rest-card animate';
        div.style.animationDelay = (idx * 0.04) + 's';
        div.setAttribute('data-id', r.id);
        div.setAttribute('role', 'listitem');
        div.setAttribute('tabindex', '0');
        div.innerHTML =
          '<div class="cat-dot" style="background:' + cat.color + '"></div>'
          + '<div class="rest-info">'
          + '<div class="rest-name">' + cat.emoji + ' ' + r.name + '</div>'
          + '<div class="rest-name-jp">' + r.nameJp + '</div>'
          + '<div class="rest-meta">'
          + '<span class="rest-rating">' + stars + ' ' + r.rating + '</span>'
          + '<span class="rest-reviews">(' + r.reviews + ')</span>'
          + '<span class="rest-price">' + r.price + '</span>'
          + '</div>'
          + '<div class="rest-meta" style="margin-top:3px">'
          + '<span class="rest-hours">🕐 ' + r.hours + '</span>'
          + '</div>'
          + '<div class="rest-meta">'
          + '<span class="rest-distance">🚶 ' + r.distance + '</span>'
          + '<span class="cat-badge" style="background:' + cat.color + '">' + cat.label + '</span>'
          + '</div>'
          + '<div class="rest-tip">' + r.tip + '</div>'
          + '</div>';
        div.addEventListener('click', function() { focusRestaurant(r.id); });
        div.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') focusRestaurant(r.id); });
        restListEl.appendChild(div);
      });
    }

    renderCards(RESTAURANTS);

    // ===== FILTER =====
    var currentCat = 'all';
    var currentSearch = '';

    function getFiltered() {
      return RESTAURANTS.filter(function(r) {
        var catOk = currentCat === 'all' || r.cat === currentCat;
        var srchOk = !currentSearch || r.name.includes(currentSearch) || r.nameJp.includes(currentSearch) || r.tip.includes(currentSearch);
        return catOk && srchOk;
      });
    }

    function applyFilter() {
      var filtered = getFiltered();
      renderCards(filtered);
      document.getElementById('resultCount').textContent = filtered.length + '개 가게';

      // Show/hide markers
      RESTAURANTS.forEach(function(r) {
        var show = filtered.some(function(f) { return f.id === r.id; });
        if (show) { markers[r.id].addTo(map); } else { markers[r.id].remove(); }
      });
    }

    function filterCat(cat, btn) {
      currentCat = cat;
      // Update pill styles
      document.querySelectorAll('.cat-pill').forEach(function(p) {
        p.classList.remove('active');
        p.style.background = '';
        p.style.borderColor = '';
        p.style.color = '';
      });
      btn.classList.add('active');
      if (cat === 'all') {
        btn.style.background = '#C85A30'; btn.style.borderColor = '#C85A30'; btn.style.color = '#fff';
      } else {
        var c = CATEGORIES[cat].color;
        btn.style.background = c; btn.style.borderColor = c; btn.style.color = '#fff';
      }
      applyFilter();
    }

    function filterSearch() {
      currentSearch = document.getElementById('searchInput').value.trim();
      applyFilter();
    }

    // ===== FOCUS / HIGHLIGHT =====
    function focusRestaurant(id) {
      var r = RESTAURANTS.find(function(x) { return x.id === id; });
      if (!r) return;
      map.flyTo([r.lat, r.lng], 16, { duration: 0.8 });
      setTimeout(function() { markers[id].openPopup(); }, 500);
      highlightCard(id);
    }

    function highlightCard(id) {
      document.querySelectorAll('.rest-card').forEach(function(c) { c.classList.remove('active'); });
      var card = document.querySelector('.rest-card[data-id="' + id + '"]');
      if (card) {
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // ===== MENU =====
    function toggleMenu() {
      var d = document.getElementById('vizMenuDropdown');
      if (d) d.classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.viz-menu')) {
        var d = document.getElementById('vizMenuDropdown');
        if (d) d.classList.remove('open');
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { var d = document.getElementById('vizMenuDropdown'); if (d) d.classList.remove('open'); }
    });

    // ===== THEME =====
    var savedTheme = localStorage.getItem('viz-theme');
    var currentTheme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      document.getElementById('themeIcon').textContent = t === 'dark' ? '🌙' : '☀️';
      document.getElementById('themeLabel').textContent = t === 'dark' ? '다크' : '라이트';
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    // ===== COUNTERS =====
    function animateCounters() {
      document.querySelectorAll('[data-count]').forEach(function(el) {
        if (el.dataset.counted) return;
        el.dataset.counted = '1';
        var target = parseFloat(el.dataset.count);
        var start = performance.now(), duration = 1000;
        (function tick(now) {
          var p = Math.min((now - start) / duration, 1), eased = 1 - Math.pow(1 - p, 3);
          el.textContent = Math.round(target * eased);
          if (p < 1) requestAnimationFrame(tick);
        })(start);
      });
    }
    window.addEventListener('load', animateCounters);

    // ===== DOWNLOAD PNG =====
    async function downloadImage() {
      var menu = document.querySelector('.viz-menu');
      if (menu) menu.style.display = 'none';
      try {
        var url = await htmlToImage.toPng(document.body, { quality: 1, pixelRatio: 2 });
        var a = document.createElement('a'); a.href = url;
        a.download = 'tsushima-izuhara-restaurant-map.png'; a.click();
      } catch(e) { console.error('Download failed:', e); }
      if (menu) menu.style.display = '';
    }

    // Initial result count
    document.getElementById('resultCount').textContent = RESTAURANTS.length + '개 가게';
  </script>
